<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify - Your favourite music is here</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <nav>
      <ul>
        <li class="brand"><img src="logo.png" alt="Spotify logo" />Spotify</li>
        <li>Home</li>
        <li>About</li>
      </ul>
    </nav>
    <div class="container">
      <div class="songlist">
        <h1>High Quality Digital Audio Collection</h1>
        <div class="songItemContainer">
          <div class="songItem">
            <img src="covers/1.jpg" alt="1" />
            <span class="songName">Morning Breeze</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >02:09<i
                  class="fa-solid fa-circle-play songItemPlay"
                  id="0"
                ></i></span
            ></span>
          </div>
          <div class="songItem">
            <img src="covers/2.jpg" alt="2" />
            <span class="songName">Echoes of Time</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >01:16<i
                  class="fa-solid fa-circle-play songItemPlay"
                  id="1"
                ></i></span
            ></span>
          </div>
          <div class="songItem">
            <img src="covers/3.jpg" alt="3" />
            <span class="songName">Quiet Horizons</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >02:20<i
                  class="fa-solid fa-circle-play songItemPlay"
                  id="2"
                ></i></span
            ></span>
          </div>
          <div class="songItem">
            <img src="covers/4.jpg" alt="4" />
            <span class="songName">Golden Path</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >02:11<i
                  class="fa-solid fa-circle-play songItemPlay"
                  id="3"
                ></i></span
            ></span>
          </div>
          <div class="songItem">
            <img src="covers/5.jpg" alt="5" />
            <span class="songName">Midnight Reflections</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >02:16<i
                  class="fa-solid fa-circle-play songItemPlay"
                  id="4"
                ></i></span
            ></span>
          </div>
          <div class="songItem">
            <img src="covers/6.jpg" alt="6" />
            <span class="songName">Calm Waters</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >01:59<i
                  class="fa-solid fa-circle-play songItemPlay"
                  id="5"
                ></i></span
            ></span>
          </div>
          <div class="songItem">
            <img src="covers/7.jpg" alt="7" />
            <span class="songName">Hidden Journey</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >04:27<i
                  class="fa-solid fa-circle-play songItemPlay"
                  id="6"
                ></i></span
            ></span>
          </div>
          <div class="songItem">
            <img src="covers/8.jpg" alt="8" />
            <span class="songName">Crystal Skies</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >04:33<i
                  class="fa-solid fa-circle-play songItemPlay"
                  id="7"
                ></i></span
            ></span>
          </div>
          <div class="songItem">
            <img src="covers/9.jpg" alt="9" />
            <span class="songName">Silent Footsteps</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >02:33<i
                  class="fa-solid fa-circle-play songItemPlay"
                  id="8"
                ></i></span
            ></span>
          </div>
          <div class="songItem">
            <img src="covers/10.jpg" alt="10" />
            <span class="songName">Endless Sunrise</span>
            <span class="songlistplay"
              ><span class="timestamp"
                >03:50<i
                  class="fa-solid fa-circle-play songItemPlay"
                  id="9"
                ></i></span
            ></span>
          </div>
        </div>
      </div>
      <div class="songBanner"></div>
    </div>
    <div class="bottom">
      <input
        type="range"
        name="range"
        id="myProgressBar"
        value="0"
        min="0"
        max="100"
      />
      <div class="icons">
        <!-- icons -->
        <i class="fa-solid fa-backward-step" id="previous"></i>
        <i class="fa-solid fa-circle-play" id="masterplay"></i>
        <i class="fa-solid fa-forward-step" id="next"></i>
      </div>
      <div class="songinfo">
        <img src="playing.gif" width="42px" id="gif" />
        <span id="currentSong">Morning Breeze</span>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
